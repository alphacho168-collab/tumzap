<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตำแซ่บ ซ.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl p-4">
        <h1 class="text-2xl font-bold text-center mb-4 text-orange-600">ตำแซ่บ ซ.4</h1>
        <div id="menu-grid" class="grid grid-cols-2 gap-4"></div>
        <button onclick="openCart()" class="fixed bottom-4 left-4 right-4 bg-green-600 text-white p-4 rounded-2xl font-bold shadow-xl">🛒 ตรวจสอบตะกร้า</button>
    </div>

    <!-- MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm">
            <h2 id="modal-title" class="font-bold mb-4">ตะกร้าของคุณ</h2>
            <div id="cart-content"></div>
            <button id="send-btn" onclick="sendOrder()" class="w-full bg-orange-600 text-white p-3 rounded-xl mt-4 font-bold">ยืนยันสั่งซื้อ</button>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="w-full text-gray-400 mt-2">ปิด</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwT_Eosuo1w7RSbqRe6xqkteXgh3HJ15frfUXldmfeMKB1ToRgBrYXFi3ub2G0eIsb-dw/exec";
        let cart = [];

        async function init() {
            try {
                const res = await fetch(API_URL + "?action=getInitialData");
                const data = await res.json();
                renderMenu(data.menu);
            } catch(e) { 
                console.error(e); 
            }
        }

        function renderMenu(menu) {
            document.getElementById('menu-grid').innerHTML = menu.map(item => `
                <div class="border p-3 rounded-2xl text-center">
                    <div class="text-3xl">${item.image || '🥗'}</div>
                    <div class="font-bold text-sm mt-2">${item.name}</div>
                    <div class="text-orange-600 font-bold">฿${item.price}</div>
                    <button onclick="addToCart('${item.name}', ${item.price})" class="bg-slate-900 text-white w-full py-2 mt-2 rounded-lg text-xs font-bold">+ สั่งเลย</button>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            cart.push({name, price});
            alert("เพิ่ม " + name + " แล้ว");
        }

        function openCart() {
            document.getElementById('cart-content').innerHTML = cart.map((item, i) => 
                `<div class="flex justify-between text-sm py-1 border-b"><span>${item.name}</span><span>฿${item.price}</span></div>`
            ).join('');
            document.getElementById('modal').classList.remove('hidden');
        }

        async function sendOrder() {
            const btn = document.getElementById('send-btn');
            btn.innerText = "กำลังส่ง...";
            btn.disabled = true;

            try {
                await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "createOrder",
                        table: "A01",
                        totalPrice: cart.reduce((s, i) => s + i.price, 0),
                        time: new Date().toLocaleTimeString(),
                        items: cart.map(i => ({ name: i.name, qty: 1, price: i.price }))
                    })
                });
                alert("✅ ส่งออเดอร์เข้าครัวสำเร็จ!");
                cart = [];
                document.getElementById('modal').classList.add('hidden');
            } catch(e) {
                alert("เกิดข้อผิดพลาด โปรดลองอีกครั้ง");
            } finally {
                btn.innerText = "ยืนยันสั่งซื้อ";
                btn.disabled = false;
            }
        }
        init();
    </script>
</body>
</html>
